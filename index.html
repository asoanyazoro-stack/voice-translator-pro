<!DOCTYPE html>
<html>
<head>
    <title>Voice Translator Pro</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #121212; color: white; text-align: center; margin: 0; padding: 20px; }
        .card { background: #1e1e1e; padding: 20px; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.5); }
        button { background: #00d2ff; border: none; padding: 15px 30px; border-radius: 30px; color: white; font-weight: bold; margin-top: 20px; width: 100%; }
        #output { margin-top: 20px; font-size: 1.2rem; color: #00d2ff; }
        /* ADMOB SPACING -m/
        #ad-container { position: fixed; bottom: 0; left: 0; width: 100%; height: 50px; background: #000; display: flex; align-items: center; justify-content: center; font-size: 10px; color: #444; }
    </style>
</head>
<body>

    <div class="card">
        <h2>Global Voice 🎙️</h2>
        <p>Tap to speak, then I'll translate to Spanish!</p>
        
        <button onclick="startProcess()">Start Talking</button>
        
        <div id="output">Waiting for voice...</div>
    </div>

    <div id="ad-container">AdMob Banner Space</div>

    <script>
        const recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
        
        function startProcess() {
            recognition.start();
            document.getElementById('output').innerText = "Listening...";
        }

        recognition.onresult = async (event) => {
            const speechToText = event.results[0][0].transcript;
            document.getElementById('output').innerText = "Translating: " + speechToText + "...";

            // QUICK SHORTCUT: Simple Translation Logic (Example: English to Spanish)
            // In a real app, you'd fetch a translation API here.
            try {
                const res = await fetch(`https://api.mymemory.translated.net/get?q=${speechToText}&langpair=en|es`);
                const data = await res.json();
                const translatedText = data.responseData.translatedText;
                
                document.getElementById('output').innerHTML = `
                    <small>You said:</small> ${speechToText}<br>
                    <small>Spanish:</small> <strong>${translatedText}</strong>
                `;
                
                // Speak it out loud!
                const speech = new SpeechSynthesisUtterance(translatedText);
                speech.lang = 'es-ES';
                window.speechSynthesis.speak(speech);
                
            } catch (err) {
                document.getElementById('output').innerText = "Error translating. Check internet!";
            }
        };
    </script>
</body>
</html>
